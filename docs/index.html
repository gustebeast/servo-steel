<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Servo Pedal Steel — assembly</title>
  <style>
    html, body { margin: 0; height: 100%; background: #16181c; color: #c9ced6;
                 font: 14px/1.4 system-ui, sans-serif; }
    model-viewer { width: 100%; height: 100%; --poster-color: #16181c; }
    .label { position: fixed; left: 16px; top: 14px; opacity: .8;
             pointer-events: none; }
    .label b { color: #e6eaf0; }
    .hint { position: fixed; left: 16px; bottom: 14px; opacity: .55; }
  </style>
  <script type="module"
          src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <div class="label"><b>Servo Pedal Steel</b> — body · strings · nut block · motor/changer</div>
  <model-viewer src="assembly.glb"
                camera-controls auto-rotate
                interaction-prompt="none"
                shadow-intensity="1" exposure="1.1"
                environment-image="neutral" tone-mapping="neutral"
                camera-orbit="-35deg 70deg auto">
  </model-viewer>
  <div class="hint">drag to orbit · scroll to zoom · two-finger drag to pan</div>
</body>
</html>
